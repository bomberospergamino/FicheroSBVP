<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>En central | Bomberos Pergamino</title>
  <style>
    :root{
      --navy:#062f45; --navy2:#0a3a53;
      --red:#c7373b; --white:#fff;
      --card: rgba(255,255,255,.10);
      --stroke: rgba(255,255,255,.18);
      --muted: rgba(255,255,255,.75);
      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--white);
      background:
        radial-gradient(1200px 700px at 20% 15%, rgba(199,55,59,.22), transparent 55%),
        radial-gradient(900px 600px at 80% 80%, rgba(255,255,255,.10), transparent 60%),
        linear-gradient(135deg, var(--navy), var(--navy2));
      overflow:hidden;
    }
    body::before{
      content:""; position:fixed; inset:0;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size:34px 34px; opacity:.35; pointer-events:none;
    }

    .screen{
      min-height:100vh;
      display:grid;
      grid-template-columns: 220px 1fr 280px;
      padding: 18px;
      gap: 14px;
      position:relative;
    }

    .left{ position:relative; z-index:1; }
    .logoBox{ width:150px; height:150px; opacity:.22; pointer-events:none; user-select:none; }
    .logoBox img{ width:100%; height:100%; object-fit:contain; }

    .tabs{
      position:absolute; left:0; bottom:0;
      display:flex; flex-direction:column; gap:10px; width:190px;
    }
    .tab{
      text-decoration:none; color: rgba(255,255,255,.92);
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      padding: 12px 12px;
      font-weight: 950;
      letter-spacing:.6px;
      text-transform: uppercase;
      display:flex; align-items:center; gap:10px;
      box-shadow: 0 12px 22px rgba(0,0,0,.18);
    }
    .tab.active{
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.30);
      box-shadow: 0 18px 30px rgba(0,0,0,.26);
      position:relative;
    }
    .tab.active::after{
      content:""; position:absolute; left:14px; right:14px; bottom:7px;
      height:4px; border-radius:999px;
      background: linear-gradient(90deg, rgba(199,55,59,.95), rgba(255,255,255,.35));
    }

    .center{ display:flex; align-items:center; justify-content:center; z-index:1; }
    .panel{
      width: min(920px, 100%);
      background: linear-gradient(180deg, var(--card), rgba(255,255,255,.06));
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      overflow:hidden;
    }
    .head{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .title{ font-weight:950; letter-spacing:1.4px; text-transform:uppercase; font-size:18px; margin:0; }
    .badge{
      padding:8px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      font-weight:900;
    }
    .muted{ color: var(--muted); font-size:13px; }

    table{ width:100%; border-collapse:collapse; margin-top: 12px; }
    th,td{ padding:10px; border-bottom:1px solid rgba(255,255,255,.10); text-align:left; font-size:14px; }
    th{ color: rgba(255,255,255,.75); font-size:12px; letter-spacing:.3px; text-transform:uppercase; }

    .right{
      display:flex; flex-direction:column; gap: 12px;
      align-items:flex-end; justify-content:flex-start; z-index:1;
    }
    .card{
      width:100%;
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: 14px;
      padding: 12px 12px;
      box-shadow: 0 10px 26px rgba(0,0,0,.22);
    }
    .clock .date{ font-weight:900; font-size: 13px; letter-spacing:.3px; text-transform: capitalize; }
    .clock .time{ font-weight:950; font-size: 18px; margin-top: 4px; }
    .clock .tz{ font-size: 12px; color: var(--muted); margin-top: 2px; }

    .calHead{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom: 8px; }
    .calTitle{ font-weight:950; letter-spacing:.8px; text-transform:uppercase; font-size: 13px; margin:0; }
    .calToday{ font-size: 12px; color: var(--muted); white-space:nowrap; }
    .calList{ margin:0; padding-left:16px; color: rgba(255,255,255,.90); font-size: 13px; line-height:1.45; }
    .calEmpty{ color: var(--muted); font-size: 13px; margin:0; }

    .footerText{
      position: fixed; left:0; right:0; bottom: 12px;
      text-align:center; color: rgba(255,255,255,.70);
      font-size: 12px; letter-spacing:.3px;
      pointer-events:none;
    }

    @media (max-width: 980px){
      body{ overflow:auto; }
      .screen{ grid-template-columns: 1fr; padding-bottom: 60px; }
      .tabs{ position: static; width:100%; margin-top: 14px; }
      .right{ align-items:stretch; }
    }
  </style>
</head>

<body>
  <div class="screen">
    <aside class="left">
      <div class="logoBox"><img src="logo.png" alt="Logo"></div>
      <nav class="tabs">
        <a class="tab" href="index.html">📌 FICHERO</a>
        <a class="tab active" href="central.html">👥 EN CENTRAL</a>
        <a class="tab" href="reporte.html">📄 REPORTE</a>
      </nav>
    </aside>

    <main class="center">
      <section class="panel">
        <div class="head">
          <h1 class="title">EN CENTRAL</h1>
          <div class="badge" id="count">Cargando…</div>
        </div>
        <div class="muted">Personal cuyo último movimiento fue <b>INGRESO</b>. Actualiza cada 15 segundos.</div>

        <table>
          <thead>
            <tr>
              <th>Legajo</th><th>Apellido</th><th>Nombre</th><th>Grado</th><th>Cargo</th><th>Especialidad</th><th>Último</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="7" class="muted">Cargando…</td></tr>
          </tbody>
        </table>
      </section>
    </main>

    <aside class="right">
      <div class="card clock">
        <div class="date" id="dateStr">—</div>
        <div class="time" id="timeStr">—</div>
        <div class="tz">Argentina (AR)</div>
      </div>

      <div class="card">
        <div class="calHead">
          <div class="calTitle">CALENDARIO</div>
          <div class="calToday" id="calToday">—</div>
        </div>
        <p class="calEmpty" id="calEmpty">Sin recordatorios para hoy.</p>
        <ul class="calList" id="calList" style="display:none;"></ul>
      </div>
    </aside>
  </div>

  <div class="footerText">Sociedad Bomberos Voluntarios Pergamino</div>

<script>
  const ENDPOINT = "https://script.google.com/macros/s/AKfycbzMSS1WIv2G53yu9jaWlianwsq2A6LEjlTY-pdnlD2b_awVtxNC7Il7AcnOxwTtNY_d/exec";
  const TZ = "America/Argentina/Buenos_Aires";

  // Clock AR
  const fmtDate = new Intl.DateTimeFormat("es-AR", { timeZone: TZ, weekday:"long", year:"numeric", month:"2-digit", day:"2-digit" });
  const fmtTime = new Intl.DateTimeFormat("es-AR", { timeZone: TZ, hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false });
  const fmtShort = new Intl.DateTimeFormat("es-AR", { timeZone: TZ, day:"2-digit", month:"2-digit" });

  function tick(){
    const now = new Date();
    const d = fmtDate.format(now);
    const t = fmtTime.format(now);
    document.getElementById("dateStr").textContent = d.charAt(0).toUpperCase() + d.slice(1);
    document.getElementById("timeStr").textContent = t;
    document.getElementById("calToday").textContent = fmtShort.format(now);
  }
  tick(); setInterval(tick, 1000);

  async function load(){
    const tbody = document.getElementById("tbody");
    const count = document.getElementById("count");

    try{
      const r = await fetch(`${ENDPOINT}?action=dentro`, { cache: "no-store" });
      const j = await r.json();

      if(!j.ok){
        count.textContent = "Error";
        tbody.innerHTML = `<tr><td colspan="7">Error: ${esc(j.error || "desconocido")}</td></tr>`;
        return;
      }

      count.textContent = `Dentro: ${j.count}`;

      if(j.count === 0){
        tbody.innerHTML = `<tr><td colspan="7" class="muted">No hay personal fichado como DENTRO.</td></tr>`;
        return;
      }

      tbody.innerHTML = j.data.map(p => `
        <tr>
          <td>${esc(p.legajo)}</td>
          <td>${esc(p.apellido)}</td>
          <td>${esc(p.nombre)}</td>
          <td>${esc(p.grado)}</td>
          <td>${esc(p.cargo)}</td>
          <td>${esc(p.especialidad)}</td>
          <td>${fmt(p.ultimo_timestamp)}</td>
        </tr>
      `).join("");
    }catch(err){
      count.textContent = "Error";
      tbody.innerHTML = `<tr><td colspan="7">Error de red: ${esc(String(err))}</td></tr>`;
    }
  }

  function esc(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function fmt(x){
    if(!x) return "";
    const d = new Date(x);
    return isNaN(d.getTime()) ? esc(x) : d.toLocaleString("es-AR");
  }

  load();
  setInterval(load, 15000);
</script>
</body>
</html>
